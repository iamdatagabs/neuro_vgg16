name: CI - neuro_vgg16

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências básicas
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas

    - name: Teste básico
      run: |
        python -c "import numpy, pandas; print('CI OK')"
