name: CI - neuro_vgg16

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: 📥 Checkout
      uses: actions/checkout@v3

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas nbformat nbconvert

    - name: 📁 Listar arquivos (debug leve)
      run: ls -R

    - name: 📓 Validar estrutura do notebook
      run: |
        python - <<EOF
        import nbformat
        nb = nbformat.read("neuro_vgg16.ipynb", as_version=4)
        print("Notebook válido ✅")
        EOF

    - name: 🔄 Converter notebook (sem executar)
      run: |
        jupyter nbconvert --to notebook neuro_vgg16.ipynb

    - name: 🧪 Teste básico
      run: |
        python -c "import numpy, pandas; print('CI OK')"
