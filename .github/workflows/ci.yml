name: CI - neuro_vgg16

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas nbformat nbconvert jupyter ipykernel

      - name: 📁 Listar arquivos (debug leve)
        run: ls -R

      - name: 📓 Validar notebook (estrutura)
        run: |
          python - <<EOF
          import nbformat

          path = "neuro_vgg16.ipynb"
          nb = nbformat.read(path, as_version=4)

          print("Notebook válido ✅")
          print(f"Células: {len(nb.cells)}")
          EOF

      - name: 🔄 Executar notebook (validação real)
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            neuro_vgg16.ipynb

      - name: 🧪 Teste básico
        run: |
          python -c "import numpy, pandas; print('CI OK 🚀')"
